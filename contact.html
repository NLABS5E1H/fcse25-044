   <div class="container">
    <div class="contact-form shadow rounded mt-5">
        <div class="row">
            <div class="col-md-4 form-left p-5">
               <h2 class="mb-4">Contact Us</h2>
               <p>leave feedback or join the discussion</p>
               <div class="contact-us">
                <div class="email d-flex align-items-center mb-4">
                   <i class="fa-regular fa-envelope icon"></i> 
                   <p><b>Email</b></p>
                </div>
                <div class="twitter d-flex align-items-center mb-4">
                   <i class="fa-brands fa-x-twitter icon"></i> 
                   <p><b>Twitter</b></p>
                </div>
                <div class="discord d-flex align-items-center mb-4">
                   <i class="fa-brands fa-discord icon"></i> 
                   <p><b>Discord</b></p>
                </div>
                <div class="facebook d-flex align-items-center mb-4">
                   <i class="fa-brands fa-facebook-f icon"></i>
                   <p><b>Facebook</b></p>
                </div>
                <div class="youtube d-flex align-items-center mb-4">
                  <i class="fa-brands fa-youtube icon"></i> 
                   <p><b>Youtube</b></p>
                </div>                                                                
               </div>
            </div>
            <div class="col-md-8 form-right p-5">
                <h1 class="mb-4">Send us a message</h1>
                <form class="row g-3">
                    <div class="col-md-6">
                        <label id="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Name">
                    </div>
                    <div class="col-md-6">
                        <label id="email" class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Email">
                    </div>
                    <div class="col-12">
                        <label id="inputSubject" class="form-label">Subject</label>
                        <input type="text" class="form-control" placeholder="Subject">
                    </div>
                    <div class="col-12">
                        <label id="inputMessage" class="form-label">Message</label>
                        <textarea class="form-control" rows="6" placeholder="Message"></textarea>
                    </div>
                    <div class="col-12">
                        <button class="button" type="submit">Send Massage</button>
                    </div>                                                              
                </form>
            </div>
        </div>
